<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WordPilot v4.0 güncellemesi</title><style>body{font-family:system-ui,sans-serif;background:#f5f7fb;color:#17182a;display:grid;place-items:center;min-height:100vh;margin:0}.box{background:#fff;border:1px solid #e3e6ef;border-radius:22px;padding:28px;max-width:460px;text-align:center;box-shadow:0 18px 50px #1b214018}h1{font-size:24px}p{color:#667085;line-height:1.5}</style></head><body><div class="box"><h1>WordPilot v4.0 yükleniyor…</h1><p>Eski uygulama dosyaları temizleniyor. XP, kelime işaretleri ve ilerlemeler silinmez.</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('wordpilot-')).map(k=>caches.delete(k)))}}catch(e){console.error(e)}const u=new URL('./index.html',location.href);u.searchParams.set('build','400');u.searchParams.set('t',Date.now());location.replace(u.href)})();</script></body></html>
