<!doctype html>
<html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WordPilot güncelleniyor</title>
<style>body{font-family:system-ui,sans-serif;background:#f5f7fb;color:#17182a;display:grid;place-items:center;min-height:100vh;margin:0}.box{background:#fff;border:1px solid #e3e6ef;border-radius:22px;padding:28px;max-width:440px;text-align:center;box-shadow:0 18px 50px #1b214018}h1{font-size:24px}p{color:#667085;line-height:1.5}</style></head>
<body><div class="box"><h1>WordPilot güncelleniyor…</h1><p>Eski uygulama önbelleği temizleniyor. İlerlemen ve kelime işaretlerin silinmez.</p></div>
<script>
(async()=>{
  try{
    if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}
    if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('wordpilot-')).map(k=>caches.delete(k)))}
  }catch(e){console.error(e)}
  location.replace('./?wpbuild=3.6.5&t='+Date.now());
})();
</script></body></html>
